<html lang="en">

<style>
:root {
    --green: #00C853;
    --green-dim: rgba(0,200,83,0.15);
    --green-glow: rgba(0,200,83,0.08);
    --black: #080b0d;
    --surface: rgba(14,18,22,0.96);
    --surface2: rgba(22,28,34,0.9);
    --border: rgba(255,255,255,0.07);
    --border-green: rgba(0,200,83,0.25);
    --text: #eaf0f6;
    --text-muted: #7a8a9a;
    --text-dim: #3a4a5a;
    --blue: #3D9EFF;
    --yellow: #FFD600;
    --red: #FF3B3B;
    --orange: #FF8C42;
    --panel-w: 310px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body, html {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--black);
    color: var(--text);
    overflow: hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--green); }

/* ── HEADER ── */
.header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 54px;
    z-index: 1000;
    background: rgba(8,11,13,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
}
.header-brand {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.3px;
}
.header-brand span { color: var(--green); }
.header-live {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    background: var(--green-dim);
    border: 1px solid var(--border-green);
    padding: 4px 12px;
    border-radius: 20px;
}
.pulse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(0.8); }
}
.header-back {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    transition: all 0.2s;
}
.header-back:hover { color: var(--text); border-color: var(--border-green); }

/* ── MAP ── */
#live-map {
    position: fixed;
    top: 54px; left: 0; right: 0; bottom: 0;
    z-index: 1;
}

/* Override Leaflet default tiles with dark style */
.leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(0.9) saturate(0.7); }

/* ── PANEL ── */
.panel {
    position: fixed;
    top: 54px;
    right: 0;
    bottom: 0;
    width: var(--panel-w);
    z-index: 500;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(20px);
    transition: transform 0.3s ease;
}

.panel-header {
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
.panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.panel-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
}

/* ── STAT GRID ── */
.stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}
.stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
}
.stat-box::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
}
.stat-box.total::before  { background: linear-gradient(90deg, var(--text-dim), var(--text-muted)); }
.stat-box.online::before { background: var(--green); }
.stat-box.ontrip::before { background: var(--blue); }
.stat-box.offline::before{ background: var(--red); }

.stat-box:hover { border-color: rgba(255,255,255,0.15); }
.stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
}
.stat-box.total .stat-num  { color: var(--text); }
.stat-box.online .stat-num { color: var(--green); }
.stat-box.ontrip .stat-num { color: var(--blue); }
.stat-box.offline .stat-num{ color: var(--red); }
.stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }

/* ── CAPTAIN LIST ── */
.panel-list-header {
    padding: 14px 18px 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* ── FILTER TABS ── */
.filter-tabs {
    display: flex;
    gap: 4px;
    padding: 0 18px 12px;
    flex-shrink: 0;
}
.filter-tab {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--text-muted);
    background: none;
    transition: all 0.15s;
}
.filter-tab.active { background: var(--green-dim); color: var(--green); border-color: var(--border-green); }
.filter-tab:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,0.15); }

.captain-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 10px 10px;
}

.captain-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
    border: 1px solid transparent;
}
.captain-item:hover { background: var(--surface2); border-color: var(--border); }
.captain-item.selected { background: var(--green-glow); border-color: var(--border-green); }

.captain-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    position: relative;
    background: var(--surface2);
    border: 1px solid var(--border);
    overflow: hidden;
}
.captain-avatar img { width: 100%; height: 100%; object-fit: cover; }
.status-ring {
    position: absolute;
    bottom: -1px; right: -1px;
    width: 11px; height: 11px;
    border-radius: 50%;
    border: 2px solid var(--surface);
}
.status-ring.active  { background: var(--green); }
.status-ring.on-trip { background: var(--blue); }
.status-ring.inactive{ background: var(--red); }

.captain-info { flex: 1; min-width: 0; }
.captain-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.captain-sub {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 1px;
}
.captain-fare {
    font-size: 11px;
    font-weight: 700;
    color: var(--green);
    flex-shrink: 0;
}

/* ── MAP ZOOM CONTROLS ── */
.leaflet-control-zoom {
    border: none !important;
    box-shadow: none !important;
}
.leaflet-control-zoom a {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    color: var(--text-muted) !important;
    font-size: 16px !important;
    width: 32px !important;
    height: 32px !important;
    line-height: 30px !important;
    backdrop-filter: blur(10px);
}
.leaflet-control-zoom a:hover { color: var(--green) !important; border-color: var(--border-green) !important; }

/* ── POPUP STYLING ── */
.leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    border-radius: 12px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    color: var(--text) !important;
    padding: 0 !important;
    backdrop-filter: blur(20px);
}
.leaflet-popup-content { margin: 0 !important; padding: 0 !important; }
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-close-button { color: var(--text-muted) !important; font-size: 16px !important; padding: 8px 10px !important; }

.popup-card {
    padding: 14px 16px;
    min-width: 200px;
}
.popup-name {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.popup-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
}
.popup-badge.active  { background: var(--green-dim); color: var(--green); }
.popup-badge.on-trip { background: rgba(61,158,255,0.15); color: var(--blue); }
.popup-badge.inactive{ background: rgba(255,59,59,0.12); color: var(--red); }

.popup-row {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 4px;
}
.popup-row i { width: 14px; text-align: center; color: var(--text-dim); }
.popup-divider { height: 1px; background: var(--border); margin: 8px 0; }
.popup-trip-label { font-size: 10px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
.popup-fare { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--green); }

/* ── AUTH SCREEN ── */
#authStatusMessage {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    background: var(--black);
}
.auth-card {
    background: rgba(14,18,22,0.98);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px;
    text-align: center;
    max-width: 380px;
    width: 90%;
}
.auth-icon {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--green-dim);
    border: 2px solid var(--border-green);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--green);
    margin: 0 auto 18px;
}
.auth-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 8px;
}
.auth-card p { color: var(--text-muted); font-size: 13px; line-height: 1.6; margin-bottom: 24px; }
#adminLoginButton {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--green);
    color: #000;
    border: none;
    padding: 11px 22px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
}
#adminLoginButton:hover { background: #00a844; transform: translateY(-1px); }

/* ── EMPTY STATE ── */
.empty-list {
    padding: 24px 10px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
}
.empty-list i { font-size: 24px; display: block; margin-bottom: 8px; opacity: 0.3; }

/* ── PANEL TOGGLE BUTTON (mobile) ── */
.panel-open-btn {
    display: none;
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 600;
    width: 50px; height: 50px;
    border-radius: 50%;
    background: var(--green);
    color: #000;
    border: none;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,200,83,0.4);
    align-items: center;
    justify-content: center;
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
    .panel {
        width: 100%;
        top: auto;
        bottom: 0;
        height: 280px;
        border-left: none;
        border-top: 1px solid var(--border);
        transform: translateY(0);
    }
    .panel.hidden { transform: translateY(100%); }
    #live-map { bottom: 280px; }
    .panel-toggle { display: block; }
    .panel-open-btn { display: flex; }
    .panel-header { padding: 12px 16px 10px; }
    .stat-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .stat-num { font-size: 20px; }
    .panel-list-header { display: none; }
    .filter-tabs { display: none; }
    .captain-list { display: flex; gap: 8px; flex-direction: row; overflow-x: auto; overflow-y: hidden; padding: 0 12px 10px; }
    .captain-item { flex-direction: column; align-items: center; text-align: center; min-width: 72px; padding: 8px 6px; }
    .captain-info { width: 100%; }
    .captain-name { font-size: 11px; }
    .captain-sub { justify-content: center; }
    .captain-fare { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-brand">RAFTAROO <span>TRACKING</span></div>
    <div class="header-live">
        <div class="pulse-dot"></div>
        LIVE
    </div>
    <a href="admin.html" class="header-back">
        <i class="fas fa-arrow-left"></i> Dashboard
    </a>
</header>

<!-- AUTH SCREEN -->
<div id="authStatusMessage" style="display:none;">
    <div class="auth-card">
        <div class="auth-icon"><i class="fas fa-shield-alt"></i></div>
        <h2>Admin Access Required</h2>
        <p id="authMessageText">Sign in with your administrator Google account to view the live tracking map.</p>
        <button id="adminLoginButton"><i class="fab fa-google"></i> Sign in with Google</button>
    </div>
</div>

<!-- MAP -->
<div id="live-map"></div>

<!-- SIDE PANEL -->
<div class="panel" id="panel">
    <div class="panel-header">
        <div class="panel-title">
            Captain Overview
            <button class="panel-toggle" onclick="document.getElementById('panel').classList.toggle('hidden')">
                <i class="fas fa-chevron-down"></i>
            </button>
        </div>
        <div class="stat-grid">
            <div class="stat-box total">
                <div class="stat-num" id="totalCaptainsCount">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-box online">
                <div class="stat-num" id="onlineCaptainsCount">0</div>
                <div class="stat-label">Online</div>
            </div>
            <div class="stat-box ontrip">
                <div class="stat-num" id="onTripCaptainsCount">0</div>
                <div class="stat-label">On Trip</div>
            </div>
            <div class="stat-box offline">
                <div class="stat-num" id="offlineCaptainsCount">0</div>
                <div class="stat-label">Offline</div>
            </div>
        </div>
    </div>

    <div class="panel-list-header">
        Captains
        <span id="captainCount" style="color:var(--text-muted)">0</span>
    </div>

    <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
        <button class="filter-tab" onclick="setFilter('active', this)">Online</button>
        <button class="filter-tab" onclick="setFilter('on-trip', this)">On Trip</button>
        <button class="filter-tab" onclick="setFilter('inactive', this)">Offline</button>
    </div>

    <div class="captain-list" id="captainList">
        <div class="empty-list"><i class="fas fa-satellite-dish"></i>Connecting to live data...</div>
    </div>
</div>

<!-- Mobile panel open button -->
<button class="panel-open-btn" onclick="document.getElementById('panel').classList.toggle('hidden')">
    <i class="fas fa-list"></i>
</button>

<!-- LEAFLET JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBBS7jGzuVlTIIeN9VFBxpwHkNf-mIRzDo",
    authDomain: "raftaroo-9ce8d.firebaseapp.com",
    databaseURL: "https://raftaroo-9ce8d-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "raftaroo-9ce8d",
    storageBucket: "raftaroo-9ce8d.firebasestorage.app",
    messagingSenderId: "773738074182",
    appId: "1:773738074182:web:b7a873959c7ab8edc0ba47",
    measurementId: "G-EM1R4LGZTD"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const ADMIN_UID = "94DrBI29E0WvUqqNCInlKNMfE1z2";

let map;
let captainMarkers = {};
let captainRoutes = {};
let allRequestsData = {};
let allRidersData = {};
let currentFilter = 'all';
let selectedRiderId = null;

// ── FILTER ──
window.setFilter = (filter, btn) => {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderCaptainList(allRidersData);
};

// ── MAP ICONS ──
const getCaptainIcon = (vehicle, status) => {
    let icon = 'motorcycle';
    const v = (vehicle||'').toLowerCase();
    if (v.includes('car')) icon = 'car-side';
    else if (v.includes('pickup') || v.includes('truck')) icon = 'truck-moving';
    else if (v.includes('rickshaw') || v.includes('auto')) icon = 'taxi';


    const colors = { active: '#00C853', 'on-trip': '#3D9EFF', inactive: '#555' };
    const color = colors[status] || '#555';
    const size = status === 'on-trip' ? 28 : 24;
    const shadow = status !== 'inactive' ? `filter:drop-shadow(0 0 6px ${color}80)` : '';

    return L.divIcon({
        html: `<div style="position:relative;display:inline-block;">
            <i class="fas fa-${icon}" style="color:${color};font-size:${size}px;${shadow}"></i>
            ${status !== 'inactive' ? `<span style="position:absolute;top:-2px;right:-6px;width:8px;height:8px;background:${color};border-radius:50%;border:2px solid #080b0d;"></span>` : ''}
        </div>`,
        className: '',
        iconAnchor: [14, 14]
    });
};

const makePopup = (rider, status, tripDetails) => {
    const statusLabel = status === 'active' ? 'Online' : status === 'on-trip' ? 'On Trip' : 'Offline';
    const vIcon = (v => {
        const vl = (v||'').toLowerCase();
        if (vl.includes('car')) return 'car-side';
        if (vl.includes('pickup')) return 'truck-moving';
        if (vl.includes('rickshaw') || vl.includes('auto')) return 'taxi';
        return 'motorcycle';
    })(rider.vehicleType);

    let tripHtml = '';
    if (tripDetails) {
        tripHtml = `
            <div class="popup-divider"></div>
            <div class="popup-trip-label">Active Trip</div>
            <div class="popup-fare">Rs. ${tripDetails.fare || '—'}</div>
            <div class="popup-row" style="margin-top:6px"><i class="fas fa-map-pin"></i>${(tripDetails.destination?.address||'').substring(0,32)}...</div>
        `;
    }

    return `<div class="popup-card">
        <div class="popup-name">
            ${rider.fullName || 'Captain'}
            <span class="popup-badge ${status}">${statusLabel}</span>
        </div>
        <div class="popup-row"><i class="fas fa-${vIcon}"></i>${rider.vehicleType || 'Bike'} · ${rider.vehicleNumber || 'N/A'}</div>
        <div class="popup-row"><i class="fas fa-map-marker-alt"></i>${rider.area || 'Karachi'}</div>
        ${tripHtml}
    </div>`;
};

// ── MAP INIT ──
function initMap() {
    if (map) map.remove();
    map = L.map('live-map', {
        center: [24.8607, 67.0011],
        zoom: 13,
        zoomControl: false,
        attributionControl: false
    });

    // Dark OpenStreetMap tiles via invert CSS filter
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    L.control.zoom({ position: 'bottomleft' }).addTo(map);
    map.invalidateSize();
}

// ── RENDER ──
function renderLiveCaptains(riders) {
    allRidersData = riders || {};
    renderCaptainList(allRidersData);
    renderMapMarkers(allRidersData);
}

function renderCaptainList(riders) {
    let total = 0, online = 0, onTrip = 0, offline = 0;
    const listEl = document.getElementById('captainList');
    const items = [];

    Object.keys(riders).forEach(id => {
        const r = riders[id];
        total++;
        const status = getRiderStatus(r);
        if (status === 'active') online++;
        else if (status === 'on-trip') onTrip++;
        else offline++;

        const request = r.currentRequestId ? allRequestsData[r.currentRequestId] : null;
        const tripDetails = (status === 'on-trip' && request) ? { fare: request.fare, destination: request.destination } : null;

        if (currentFilter !== 'all' && status !== currentFilter) return;
        items.push({ id, r, status, tripDetails });
    });

    // Sort: on-trip first, then active, then inactive
    const order = { 'on-trip': 0, 'active': 1, 'inactive': 2 };
    items.sort((a, b) => (order[a.status]||2) - (order[b.status]||2));

    document.getElementById('totalCaptainsCount').textContent = total;
    document.getElementById('onlineCaptainsCount').textContent = online;
    document.getElementById('onTripCaptainsCount').textContent = onTrip;
    document.getElementById('offlineCaptainsCount').textContent = offline;
    document.getElementById('captainCount').textContent = items.length;

    if (items.length === 0) {
        listEl.innerHTML = `<div class="empty-list"><i class="fas fa-user-slash"></i>No captains found.</div>`;
        return;
    }

    listEl.innerHTML = '';
    items.forEach(({ id, r, status, tripDetails }) => {
        const item = document.createElement('div');
        item.className = `captain-item${id === selectedRiderId ? ' selected' : ''}`;
        item.onclick = () => {
            selectedRiderId = id;
            document.querySelectorAll('.captain-item').forEach(i => i.classList.remove('selected'));
            item.classList.add('selected');
            if (r.location) {
                map.setView([r.location.lat, r.location.lng], 17, { animate: true });
                if (captainMarkers[id]) captainMarkers[id].openPopup();
            }
        };

        const vIcon = (v => {
            const vl = (v||'').toLowerCase();
            if (vl.includes('car')) return 'fa-car-side';
            if (vl.includes('pickup')) return 'fa-truck-moving';
            if (vl.includes('rickshaw') || vl.includes('auto')) return 'fa-taxi';
            return 'fa-motorcycle';
        })(r.vehicleType);

        const imgHtml = r.riderImageUrl
            ? `<img src="${r.riderImageUrl}" alt="" onerror="this.style.display='none'">`
            : `<i class="fas ${vIcon}" style="color:var(--text-dim)"></i>`;

        item.innerHTML = `
            <div class="captain-avatar">
                ${imgHtml}
                <span class="status-ring ${status}"></span>
            </div>
            <div class="captain-info">
                <div class="captain-name">${r.fullName || 'Unknown'}</div>
                <div class="captain-sub">
                    <i class="fas ${vIcon}" style="font-size:10px"></i>
                    ${r.vehicleNumber || 'N/A'}
                </div>
            </div>
            ${tripDetails ? `<div class="captain-fare">Rs.${tripDetails.fare}</div>` : ''}
        `;
        listEl.appendChild(item);
    });
}

function renderMapMarkers(riders) {
    // Remove stale markers
    Object.keys(captainMarkers).forEach(id => {
        if (!riders[id] || !riders[id].location) {
            map.removeLayer(captainMarkers[id]);
            delete captainMarkers[id];
            if (captainRoutes[id]) { map.removeLayer(captainRoutes[id]); delete captainRoutes[id]; }
        }
    });

    Object.keys(riders).forEach(id => {
        const r = riders[id];
        const loc = r.location;
        if (!loc?.lat || !loc?.lng) return;

        const status = getRiderStatus(r);
        const latLng = [loc.lat, loc.lng];
        const icon = getCaptainIcon(r.vehicleType, status);

        const request = r.currentRequestId ? allRequestsData[r.currentRequestId] : null;
        const tripDetails = (status === 'on-trip' && request) ? {
            fare: request.fare,
            pickup: request.pickup,
            destination: request.destination,
            requestStatus: request.status
        } : null;

        const popupHtml = makePopup(r, status, tripDetails);

        if (!captainMarkers[id]) {
            captainMarkers[id] = L.marker(latLng, { icon }).addTo(map);
            captainMarkers[id].bindPopup(popupHtml, { maxWidth: 260, className: 'custom-popup' });
        } else {
            captainMarkers[id].setLatLng(latLng);
            captainMarkers[id].setIcon(icon);
            captainMarkers[id].setPopupContent(popupHtml);
        }

        // Route drawing
        if (status === 'on-trip' && tripDetails) {
            const captLatLng = L.latLng(loc.lat, loc.lng);
            let waypoints, color, dashArray;
            if (tripDetails.requestStatus === 'accepted' || tripDetails.requestStatus === 'arrived') {
                waypoints = [captLatLng, L.latLng(tripDetails.pickup.lat, tripDetails.pickup.lng)];
                color = '#FFD600'; dashArray = '8,6';
            } else {
                waypoints = [captLatLng, L.latLng(tripDetails.destination.lat, tripDetails.destination.lng)];
                color = '#3D9EFF'; dashArray = null;
            }
            if (captainRoutes[id]) map.removeLayer(captainRoutes[id]);
            captainRoutes[id] = L.polyline(waypoints, {
                color, weight: 3, opacity: 0.8, dashArray
            }).addTo(map);
        } else {
            if (captainRoutes[id]) { map.removeLayer(captainRoutes[id]); delete captainRoutes[id]; }
        }
    });
}

function getRiderStatus(r) {
    if (r.currentRequestId) {
        const req = allRequestsData[r.currentRequestId];
        if (req && ['accepted','arrived','in_progress'].includes(req.status)) return 'on-trip';
    }
    if (r.status === 'active') return 'active';
    return 'inactive';
}

// ── LISTENERS ──
function startListeners() {
    onValue(ref(database, 'requests'), snap => {
        allRequestsData = snap.val() || {};
        renderLiveCaptains(allRidersData);
    });
    onValue(ref(database, 'riders'), snap => {
        renderLiveCaptains(snap.val() || {});
    });
}

// ── AUTH ──
document.getElementById('adminLoginButton').addEventListener('click', () => {
    signInWithPopup(auth, provider).catch(e => console.error(e));
});

onAuthStateChanged(auth, user => {
    const authEl = document.getElementById('authStatusMessage');
    if (user && user.uid === ADMIN_UID) {
        authEl.style.display = 'none';
        initMap();
        startListeners();
    } else {
        authEl.style.display = 'flex';
        document.getElementById('authMessageText').textContent = user
            ? `Access denied for ${user.email}.`
            : 'Sign in as administrator to access live tracking.';
    }
});
</script>
