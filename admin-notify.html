<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raftaroo Admin — Push Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
  --green: #00C853;
  --green-dim: rgba(0,200,83,0.12);
  --green-glow: rgba(0,200,83,0.35);
  --dark: #07090F;
  --card: #0D1117;
  --border: rgba(255,255,255,0.07);
  --text: #E8EAED;
  --muted: rgba(255,255,255,0.38);
  --red: #FF4545;
  --yellow: #FFD600;
}

*{margin:0;padding:0;box-sizing:border-box;}

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid background */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,200,83,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,83,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
  z-index:0;
}

.wrap {
  position:relative;
  z-index:1;
  max-width: 620px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

/* ─── LOGIN SCREEN ─── */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index:1;
}

.login-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 32px;
  width: 100%;
  max-width: 380px;
  text-align: center;
  box-shadow: 0 0 60px rgba(0,200,83,0.08);
}

.login-icon {
  width: 72px;
  height: 72px;
  background: var(--green-dim);
  border: 1px solid var(--green-glow);
  border-radius: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin-bottom: 20px;
  box-shadow: 0 0 30px var(--green-glow);
}

.login-box h2 {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 6px;
  color: #fff;
}

.login-box p {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 28px;
}

.pin-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

.pin-input {
  width: 52px;
  height: 56px;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: #fff;
  font-size: 22px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  text-align: center;
  outline: none;
  transition: .2s;
  caret-color: var(--green);
}

.pin-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 16px var(--green-glow);
  background: rgba(0,200,83,0.06);
}

.login-err {
  font-size: 12px;
  color: var(--red);
  margin-bottom: 12px;
  min-height: 18px;
}

.btn-login {
  width: 100%;
  padding: 15px;
  background: var(--green);
  color: #06100A;
  border: none;
  border-radius: 14px;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: .4px;
  transition: .2s;
}

.btn-login:hover { background: #00e060; transform:translateY(-2px); }
.btn-login:active { transform:translateY(0); }

/* ─── MAIN PANEL ─── */
#mainPanel { display: none; }

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.brand {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-icon {
  width: 38px;
  height: 38px;
  background: var(--green-dim);
  border: 1px solid var(--green-glow);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.logout-btn {
  background: rgba(255,69,69,0.1);
  border: 1px solid rgba(255,69,69,0.2);
  color: var(--red);
  padding: 7px 14px;
  border-radius: 9px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: .2s;
  font-family: 'DM Sans', sans-serif;
}

.logout-btn:hover { background: rgba(255,69,69,0.2); }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 12px;
  text-align: center;
}

.stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--green);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-lbl {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
}

/* Compose card */
.compose-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 20px;
}

.section-label {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.field-group {
  margin-bottom: 16px;
}

.field-label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 7px;
  display: block;
  font-weight: 500;
}

.field-input, .field-textarea, .field-select {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: .2s;
  resize: none;
}

.field-input:focus, .field-textarea:focus, .field-select:focus {
  border-color: var(--green);
  background: rgba(0,200,83,0.04);
}

.field-select option { background: #1a1a2e; color: #fff; }

.char-count {
  font-size: 11px;
  color: var(--muted);
  text-align: right;
  margin-top: 5px;
}

.char-count.warn { color: var(--yellow); }
.char-count.over { color: var(--red); }

/* Audience chips */
.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  padding: 7px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  transition: .2s;
  font-family: 'DM Sans', sans-serif;
}

.chip.active {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
}

/* Preview card */
.preview-card {
  background: rgba(255,255,255,0.03);
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 20px;
}

.preview-notif {
  background: #1C1C1E;
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.preview-icon-box {
  width: 40px;
  height: 40px;
  background: var(--green);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.preview-title {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 3px;
  font-family: 'Syne', sans-serif;
}

.preview-body {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  line-height: 1.5;
}

.preview-time {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  margin-left: auto;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Send button */
.send-btn {
  width: 100%;
  padding: 18px;
  background: var(--green);
  color: #06100A;
  border: none;
  border-radius: 16px;
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: .5px;
  transition: .25s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(0,200,83,0.25);
  margin-bottom: 20px;
}

.send-btn:hover:not(:disabled) {
  background: #00e060;
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,200,83,0.4);
}

.send-btn:disabled {
  opacity: .5;
  cursor: not-allowed;
  transform: none;
}

/* Spinner */
.spinner {
  width: 18px;
  height: 18px;
  border: 2.5px solid rgba(0,0,0,0.2);
  border-top-color: #06100A;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast-wrap {
  position: fixed;
  top: 20px;
  right: 16px;
  left: 16px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  pointer-events: none;
}

.toast {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 14px 18px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 500;
  max-width: 340px;
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: toast-in .3s ease;
  pointer-events: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.toast.success { border-color: rgba(0,200,83,0.4); }
.toast.error   { border-color: rgba(255,69,69,0.4); }

@keyframes toast-in {
  from { transform: translateX(120%); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

/* History */
.history-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
}

.history-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.history-item:last-child { border-bottom: none; }

.h-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  margin-top: 5px;
  flex-shrink: 0;
  box-shadow: 0 0 8px var(--green-glow);
}

.h-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}

.h-meta {
  font-size: 11px;
  color: var(--muted);
}

.empty-history {
  text-align: center;
  padding: 24px;
  color: var(--muted);
  font-size: 13px;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 20px;
}

.tab {
  flex: 1;
  padding: 9px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  border-radius: 9px;
  cursor: pointer;
  transition: .2s;
  font-family: 'DM Sans', sans-serif;
}

.tab.active {
  background: var(--card);
  color: var(--green);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.tab-content { display: none; }
.tab-content.active { display: block; }

/* URL field toggle */
.url-toggle {
  font-size: 12px;
  color: var(--green);
  cursor: pointer;
  text-decoration: underline;
  background: none;
  border: none;
  padding: 0;
  font-family: 'DM Sans', sans-serif;
}

#urlGroup { display: none; }

</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<!-- ─── LOGIN ─── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <h2>Admin Access</h2>
    <p>Raftaroo Notification Panel<br>4-digit PIN daalein</p>
    <div class="pin-row">
      <input class="pin-input" type="password" maxlength="1" inputmode="numeric" id="p1" autocomplete="off">
      <input class="pin-input" type="password" maxlength="1" inputmode="numeric" id="p2" autocomplete="off">
      <input class="pin-input" type="password" maxlength="1" inputmode="numeric" id="p3" autocomplete="off">
      <input class="pin-input" type="password" maxlength="1" inputmode="numeric" id="p4" autocomplete="off">
    </div>
    <div class="login-err" id="pinErr"></div>
    <button class="btn-login" onclick="checkPin()">🚀 Enter Panel</button>
  </div>
</div>

<!-- ─── MAIN PANEL ─── -->
<div id="mainPanel">
<div class="wrap">

  <div class="top-bar">
    <div class="brand">
      <div class="brand-icon">🏍️</div>
      Notify Panel
    </div>
    <button class="logout-btn" onclick="logout()">Logout ✕</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statTokens">—</div>
      <div class="stat-lbl">Total Users</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statSent">0</div>
      <div class="stat-lbl">Bheje Gaye</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statCaptains">—</div>
      <div class="stat-lbl">Captains</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('compose', this)">✍️ Compose</button>
    <button class="tab" onclick="switchTab('history', this)">📋 History</button>
  </div>

  <!-- COMPOSE TAB -->
  <div class="tab-content active" id="tab-compose">

    <div class="compose-card">
      <div class="section-label"><i class="fa fa-bullhorn"></i> Notification Likhein</div>

      <!-- Audience -->
      <div class="field-group">
        <label class="field-label">Kishe Bhejna Hai?</label>
        <div class="chip-row">
          <button class="chip active" data-aud="all" onclick="selectAud(this)">🌍 Sabko</button>
          <button class="chip" data-aud="customers" onclick="selectAud(this)">👤 Sirf Customers</button>
          <button class="chip" data-aud="captains" onclick="selectAud(this)">🏍️ Sirf Captains</button>
        </div>
      </div>

      <!-- Type -->
      <div class="field-group">
        <label class="field-label">Notification Type</label>
        <select class="field-select" id="notifType" onchange="updatePreview()">
          <option value="promo">🎁 Promotion / Offer</option>
          <option value="general">📢 General Announcement</option>
          <option value="alert">⚠️ Important Alert</option>
          <option value="update">🆕 App Update</option>
          <option value="eid">🎉 Special Event</option>
        </select>
      </div>

      <!-- Title -->
      <div class="field-group">
        <label class="field-label">Title (Heading)</label>
        <input class="field-input" type="text" id="notifTitle" placeholder="jaise: Eid Mubarak! 🎉" maxlength="60"
          oninput="updatePreview(); updateChar('titleChar', this.value, 60)" autocomplete="off">
        <div class="char-count" id="titleChar">0 / 60</div>
      </div>

      <!-- Body -->
      <div class="field-group">
        <label class="field-label">Message (Body)</label>
        <textarea class="field-textarea" id="notifBody" rows="3"
          placeholder="jaise: Aaj Raftaroo se ride book karein aur pehli ride pe 50% discount paaein! 🏍️"
          maxlength="180" oninput="updatePreview(); updateChar('bodyChar', this.value, 180)"></textarea>
        <div class="char-count" id="bodyChar">0 / 180</div>
      </div>

      <!-- URL (optional) -->
      <div class="field-group">
        <button class="url-toggle" onclick="toggleUrl()">+ Link add karein (optional)</button>
        <div id="urlGroup" style="margin-top:10px;">
          <input class="field-input" type="text" id="notifUrl" placeholder="/index.html ya https://..." autocomplete="off">
        </div>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-card">
      <div class="section-label" style="font-size:11px; margin-bottom:12px;"><i class="fa fa-eye"></i> Live Preview</div>
      <div class="preview-notif">
        <div class="preview-icon-box" id="prevIcon">🏍️</div>
        <div style="flex:1; min-width:0;">
          <div class="preview-title" id="prevTitle">Notification Title…</div>
          <div class="preview-body" id="prevBody">Yahan aap ka message ayega…</div>
        </div>
        <div class="preview-time">Abhi</div>
      </div>
    </div>

    <!-- Send -->
    <button class="send-btn" id="sendBtn" onclick="sendNotification()">
      <i class="fa fa-paper-plane"></i>
      <span id="sendBtnText">Notification Bhejein</span>
    </button>

  </div>

  <!-- HISTORY TAB -->
  <div class="tab-content" id="tab-history">
    <div class="history-card">
      <div class="section-label"><i class="fa fa-clock-rotate-left"></i> Bheji Gayi Notifications</div>
      <div id="historyList">
        <div class="empty-history">⏳ Abhi tak koi notification nahi bheji</div>
      </div>
    </div>
  </div>

</div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import { getDatabase, ref, get, set, push, serverTimestamp, onValue }
  from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";
import { getAuth, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

// ══════════════════════════════════════════════
//  ✅ Firebase Config (auto-filled from project)
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyBBS7jGzuVlTIIeN9VFBxpwHkNf-mIRzDo",
  authDomain:        "raftaroo-9ce8d.firebaseapp.com",
  databaseURL:       "https://raftaroo-9ce8d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "raftaroo-9ce8d",
  storageBucket:     "raftaroo-9ce8d.firebasestorage.app",
  messagingSenderId: "773738074182",
  appId:             "1:773738074182:web:b7a873959c7ab8edc0ba47"
};
// ══════════════════════════════════════════════

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);
const auth = getAuth(app);

window._db = db;
window._ref = ref;
window._get = get;
window._push = push;
window._set = set;
window._serverTimestamp = serverTimestamp;

// ── Admin UID check: sirf 94DrBI29E0WvUqqNCInlKNMfE1z2 access kar sakta hai ──
const EXPECTED_ADMIN_UID = '94DrBI29E0WvUqqNCInlKNMfE1z2';

onAuthStateChanged(auth, (user) => {
  if (user) {
    window._currentUid = user.uid;
    if (user.uid !== EXPECTED_ADMIN_UID) {
      // Wrong user — force logout
      console.warn('Unauthorized UID:', user.uid);
      import('https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js')
        .then(m => m.signOut(auth));
      alert('❌ Aap ko yeh panel access karne ki ijazat nahi hai.');
    }
  } else {
    window._currentUid = null;
  }
});

// Load stats
async function loadStats() {
  try {
    const usersSnap = await get(ref(db, 'users'));
    const ridersSnap = await get(ref(db, 'riders'));

    let userCount = 0;
    let tokenCount = 0;
    if (usersSnap.exists()) {
      usersSnap.forEach(child => {
        userCount++;
        if (child.val().fcmToken) tokenCount++;
      });
    }

    let captainCount = 0;
    let captainTokens = 0;
    if (ridersSnap.exists()) {
      ridersSnap.forEach(child => {
        captainCount++;
        if (child.val().fcmToken) captainTokens++;
      });
    }

    document.getElementById('statTokens').textContent = tokenCount + captainTokens;
    document.getElementById('statCaptains').textContent = captainTokens;

    // Sent count
    const notifSnap = await get(ref(db, 'admin_notifications'));
    document.getElementById('statSent').textContent = notifSnap.exists()
      ? Object.keys(notifSnap.val()).length : 0;

    window._userCount = tokenCount;
    window._captainCount = captainTokens;

  } catch(e) {
    console.warn('Stats load error:', e);
  }
}

// Load history
async function loadHistory() {
  try {
    const snap = await get(ref(db, 'admin_notifications'));
    if (!snap.exists()) return;

    const items = [];
    snap.forEach(child => items.push({ id: child.key, ...child.val() }));
    items.sort((a,b) => (b.sentAt || 0) - (a.sentAt || 0));

    const list = document.getElementById('historyList');
    if (items.length === 0) return;

    list.innerHTML = items.slice(0,20).map(n => {
      const statusIcon = n.status === 'sent' ? '✅' : n.status === 'processing' ? '⏳' : n.status === 'queued' ? '🟡' : '❌';
      const sentInfo = n.successCount !== undefined ? ` · ${n.successCount} sent / ${n.failCount || 0} failed` : '';
      return `
      <div class="history-item">
        <div class="h-dot" style="background:${n.status==='sent'?'#00C853':n.status==='queued'?'#FFD600':'#FF4545'}"></div>
        <div>
          <div class="h-title">${escHtml(n.title || '')} ${statusIcon}</div>
          <div class="h-meta">${escHtml(n.body?.substring(0,60) || '')}… · ${n.audience || 'all'} · ${n.tokenCount || 0} tokens${sentInfo} · ${formatTs(n.sentAt)}</div>
        </div>
      </div>`;
    }).join('');

  } catch(e) { console.warn(e); }
}

window.loadStats = loadStats;
window.loadHistory = loadHistory;

// Main send function
window.doSendNotification = async function(title, body, type, audience, url) {
  const db    = window._db;
  const rref  = window._ref;
  const rget  = window._get;
  const rpush = window._push;
  const rset  = window._set;

  // Collect tokens (Set se duplicates avoid)
  const tokenSet = new Set();

  if (audience === 'all' || audience === 'customers') {
    const usersSnap = await rget(rref(db, 'users'));
    if (usersSnap.exists()) {
      usersSnap.forEach(child => {
        const token = child.val().fcmToken;
        if (token) tokenSet.add(token);
      });
    }
  }

  if (audience === 'all' || audience === 'captains') {
    const ridersSnap = await rget(rref(db, 'riders'));
    if (ridersSnap.exists()) {
      ridersSnap.forEach(child => {
        const token = child.val().fcmToken;
        if (token) tokenSet.add(token);
      });
    }
  }

  const tokens = [...tokenSet];

  if (tokens.length === 0) {
    return { success: false, error: 'Koi FCM token nahi mila. Users ne notification allow ki hai?' };
  }

  // ─── FIX: push() key lo aur set() ek hi call mein karo
  // Cloud Function status:queued check karti hai — pehle se hi set hona zaroori hai
  const newKey     = rpush(rref(db, 'admin_notifications')).key;
  const newItemRef = rref(db, `admin_notifications/${newKey}`);

  await rset(newItemRef, {
    title,
    body,
    type,
    audience,
    url:        url || '/',
    tokens,
    tokenCount: tokens.length,
    sentAt:     Date.now(),
    status:     'queued'
  });

  return { success: true, count: tokens.length, id: newKey };
};

// Init
window.addEventListener('load', () => {
  if (localStorage.getItem('rft_admin_auth') === 'ok') {
    showPanel();
  }
});
</script>

<script>
// ── Admin UID — sirf yeh user access kar sakta hai ──
const ADMIN_UID = '94DrBI29E0WvUqqNCInlKNMfE1z2';

// ── PIN config — aap badal saktey hain ──
const ADMIN_PIN = '1234'; // ← APNA PIN CHANGE KAREIN

const ICONS = {
  promo: '🎁', general: '📢', alert: '⚠️', update: '🆕', eid: '🎉'
};

let currentAudience = 'all';

function checkPin() {
  const pin = ['p1','p2','p3','p4'].map(id => document.getElementById(id).value).join('');
  if (pin === ADMIN_PIN) {
    localStorage.setItem('rft_admin_auth', 'ok');
    showPanel();
  } else {
    document.getElementById('pinErr').textContent = '❌ Galat PIN! Dobara try karein.';
    ['p1','p2','p3','p4'].forEach(id => {
      document.getElementById(id).value = '';
      document.getElementById(id).style.borderColor = '#FF4545';
    });
    document.getElementById('p1').focus();
    setTimeout(() => {
      ['p1','p2','p3','p4'].forEach(id =>
        document.getElementById(id).style.borderColor = '');
      document.getElementById('pinErr').textContent = '';
    }, 1800);
  }
}

function showPanel() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainPanel').style.display = 'block';
  if (window.loadStats) window.loadStats();
  if (window.loadHistory) window.loadHistory();
}

function logout() {
  localStorage.removeItem('rft_admin_auth');
  location.reload();
}

// PIN auto-advance
['p1','p2','p3','p4'].forEach((id, i, arr) => {
  document.getElementById(id).addEventListener('input', function() {
    if (this.value.length === 1 && i < arr.length - 1) {
      document.getElementById(arr[i+1]).focus();
    }
    if (i === arr.length - 1 && this.value.length === 1) checkPin();
  });
  document.getElementById(id).addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !this.value && i > 0) {
      document.getElementById(arr[i-1]).focus();
    }
  });
});

function selectAud(btn) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  currentAudience = btn.dataset.aud;
}

function updatePreview() {
  const title = document.getElementById('notifTitle').value || 'Notification Title…';
  const body  = document.getElementById('notifBody').value || 'Yahan aap ka message ayega…';
  const type  = document.getElementById('notifType').value;
  document.getElementById('prevTitle').textContent = title;
  document.getElementById('prevBody').textContent  = body;
  document.getElementById('prevIcon').textContent  = ICONS[type] || '🏍️';
}

function updateChar(elId, val, max) {
  const el = document.getElementById(elId);
  el.textContent = `${val.length} / ${max}`;
  el.className = 'char-count' + (val.length > max * .85 ? (val.length >= max ? ' over' : ' warn') : '');
}

function toggleUrl() {
  const g = document.getElementById('urlGroup');
  g.style.display = g.style.display === 'none' ? 'block' : 'none';
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'history' && window.loadHistory) window.loadHistory();
}

async function sendNotification() {
  const title = document.getElementById('notifTitle').value.trim();
  const body  = document.getElementById('notifBody').value.trim();
  const type  = document.getElementById('notifType').value;
  const url   = document.getElementById('notifUrl').value.trim() || '/';

  if (!title) { showToast('❌ Title zaroori hai!', 'error'); return; }
  if (!body)  { showToast('❌ Message likhna zaroori hai!', 'error'); return; }

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  document.getElementById('sendBtnText').innerHTML = '<div class="spinner"></div> Bhej raha hun…';

  try {
    const result = await window.doSendNotification(title, body, type, currentAudience, url);

    if (result.success) {
      showToast(`✅ ${result.count} users ko notification queue mein daali!`, 'success');
      document.getElementById('notifTitle').value = '';
      document.getElementById('notifBody').value  = '';
      updatePreview();
      updateChar('titleChar', '', 60);
      updateChar('bodyChar', '', 180);
      if (window.loadStats) window.loadStats();
    } else {
      showToast('❌ ' + result.error, 'error');
    }
  } catch(e) {
    console.error(e);
    showToast('❌ Error: ' + e.message, 'error');
  }

  btn.disabled = false;
  document.getElementById('sendBtnText').innerHTML = '<i class="fa fa-paper-plane"></i> Notification Bhejein';
}

function showToast(msg, type = 'success') {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = msg;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatTs(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('ur-PK') + ' ' + d.toLocaleTimeString('ur-PK', {hour:'2-digit', minute:'2-digit'});
}
